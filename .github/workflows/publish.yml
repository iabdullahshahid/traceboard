name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' (version '$TAG') does not match package.json version '$VERSION'"
            exit 1
          fi
          echo "Publishing traceboard@$VERSION"

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
